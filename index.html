<style>

  *{box-sizing:border-box}
  html,body{min-height:100%}

  .layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px;min-height:calc(100vh - 32px)}
  .sidebar{position:sticky;top:16px;align-self:start;height:calc(100vh - 32px);background:#fff;border:1px solid #e3e3e0;border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:16px;z-index:20}
  .content{min-width:0;display:flex;flex-direction:column}
  header h1{font-size:20px;font-weight:600;margin:0 0 2px}
  header p{font-size:13px;color:var(--muted);margin:0 0 12px}
  .toolbar{display:flex;flex-direction:column;gap:14px}
  .field{display:flex;flex-direction:column;gap:5px;min-width:0;width:100%}
  .field label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .field select{font-size:14px;padding:8px 10px;border:1px solid #d0d0cd;border-radius:8px;background:#fff;cursor:pointer}
  .multi{position:relative;min-width:0;width:100%}
  .multi-toggle{width:100%;font-size:14px;padding:8px 34px 8px 10px;border:1px solid #d0d0cd;border-radius:8px;background:#fff;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
  .multi-toggle::after{content:"▾";position:absolute;right:11px;color:var(--muted)}
  .multi.open .multi-toggle{border-color:#1538B5;box-shadow:0 0 0 2px rgba(21,56,181,.12)}
  .multi-panel{display:none;position:absolute;z-index:60;top:calc(100% + 5px);left:0;width:100%;max-height:310px;overflow:auto;background:#fff;border:1px solid #d0d0cd;border-radius:10px;box-shadow:0 12px 28px rgba(0,0,0,.16);padding:7px}
  .multi.open .multi-panel{display:block}
  .multi-actions{display:flex;gap:6px;padding:2px 3px 7px;border-bottom:1px solid #ececea;margin-bottom:4px}
  .multi-actions button{border:0;background:transparent;color:#1538B5;font-size:12px;font-weight:600;padding:3px 5px;cursor:pointer}
  .multi-option{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;font-size:13px;cursor:pointer;white-space:nowrap}
  .multi-option:hover{background:#f3f3f1}
  .multi-option input{width:16px;height:16px;accent-color:#1538B5}
  .swatch{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .legend{display:flex;flex-direction:column;gap:8px;align-items:flex-start;font-size:13px;padding-top:2px}
  .filter-note{font-size:11px;color:var(--muted);margin:0}
  .zoom-controls{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:center}
  .zoom-level{text-align:center;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto}
  .btn{font-size:13px;font-weight:500;padding:8px 13px;border:1px solid #d0d0cd;border-radius:8px;background:#fff;cursor:pointer}
  .btn:hover{background:#f3f3f1}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .warn{background:#FFF7E6;border:1px solid #F2C66B;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a5500}
  .kpis{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:10px;margin-bottom:10px}
  .kpi{background:#fff;border:1px solid #e3e3e0;border-radius:10px;padding:11px 14px}
  .kpi .l{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .kpi .v{font-size:22px;font-weight:600}
  .kpi .s{font-size:11px;color:var(--muted);margin-top:1px}
  .stage{background:#fff;border:1px solid #e3e3e0;border-radius:14px;padding:4px;flex:1;min-height:0;display:block;overflow:auto}
  #radar{display:block;width:100%;height:calc(100vh - 164px);max-height:100%;min-height:560px}
  .tip{position:fixed;pointer-events:none;background:#15161a;color:#fff;font-size:12px;padding:9px 11px;border-radius:8px;opacity:0;transition:opacity .12s;z-index:50;min-width:240px;max-width:360px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
  .tip .t{font-weight:700;margin-bottom:3px}
  .tip .s{color:#c9ccd4;font-size:11px;margin-bottom:7px}
  .tip table{width:100%;border-collapse:collapse;font-size:11px}
  .tip th,.tip td{padding:3px 4px;border-top:1px solid rgba(255,255,255,.12);text-align:left}
  .tip th{color:#c9ccd4;font-weight:600}
  .tip td.num{text-align:right;font-variant-numeric:tabular-nums}
  #radar .competency-link text{text-decoration:underline;text-decoration-color:rgba(21,56,181,.45);text-underline-offset:2px}
  #radar .competency-link:hover text{fill:var(--q-actual)}
  @media (max-width:900px){
    .app{padding:10px}
    .layout{grid-template-columns:1fr;min-height:0}
    .sidebar{position:relative;top:0;height:auto;padding:14px}
    .toolbar{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
    .toolbar .field:first-child,.legend,.btns{grid-column:1/-1}
    .legend{flex-direction:row;flex-wrap:wrap;gap:16px}
    .kpis{grid-template-columns:1fr}
    #radar{height:auto;min-height:0}
  }
  @media (max-width:520px){.toolbar{grid-template-columns:1fr}.toolbar .field:first-child,.legend,.btns{grid-column:auto}}
</style>
</head>

function fixText(s){
  let value=String(s??"");
  for(let i=0;i<3;i++){
    try{
      const repaired=decodeURIComponent(escape(value));
      if(repaired===value) break;
      value=repaired;
    }catch(e){break;}
  }
  return value;
}
function normKey(s){
  const stop=new Set(["de","del","la","el","los","las","y"]);
  return fixText(s)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .toLowerCase()
    .split(/[^a-z0-9]+/)
    .filter(t=>t && !stop.has(t))
    .join("");
}
function roleKey(equipo,periodo,etiqueta){
  return [normKey(equipo),normKey(periodo),normKey(etiqueta)].join("||");
}

const SVG=document.getElementById('radar');
const NS="http://www.w3.org/2000/svg";

/* =====================================================================
   RADIOS POR ZONA (4 zonas estrictas, sin solapamiento)
   centro → datos → competencias → sub-dimensiones → dimensiones
   ===================================================================== */
const CX=560, CY=560;
const R_HUB         = 24;     // centro limpio
const R_DATOS_MAX   = 300;    // área de datos: 0% en R_HUB, 100% aquí
const R_COMP_INNER  = 308;    // anillo de competencias
const R_COMP_OUTER  = 398;
const R_SUB_INNER   = 404;    // anillo de sub-dimensiones
const R_SUB_OUTER   = 446;
const R_DIM_INNER   = 452;    // anillo de dimensiones (externo)
const R_DIM_OUTER   = 508;

const R_COMP_TEXT = (R_COMP_INNER + R_COMP_OUTER)/2;
const R_SUB_TEXT  = (R_SUB_INNER  + R_SUB_OUTER )/2;
const R_DIM_TEXT  = (R_DIM_INNER  + R_DIM_OUTER )/2;

const N=CATALOGO.length, STEP=(2*Math.PI)/N, START=-Math.PI/2-STEP/2;

function ang(i){return START+i*STEP;}              // borde inicial cuña i
function angC(i){return START+(i+0.5)*STEP;}       // centro cuña i
function pt(a,r){return [CX+Math.cos(a)*r, CY+Math.sin(a)*r];}
function deg(a){let d=(a*180/Math.PI)%360; if(d<0)d+=360; return d;}

function el(tag,attrs,parent){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);(parent||SVG).appendChild(e);return e;}

/* arco simple para textPath; dir=+1 CCW→CW (texto erguido arriba),
   dir=-1 invertido (texto erguido abajo) */
function arcPathDir(a0,a1,r,dir){
  if(dir<0){const t=a0;a0=a1;a1=t;}
  const [x0,y0]=pt(a0,r),[x1,y1]=pt(a1,r);
  const large=Math.abs(a1-a0)>Math.PI?1:0;
  const sweep=dir<0?0:1;
  return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} ${sweep} ${x1.toFixed(2)} ${y1.toFixed(2)}`;
}
function wedge(a0,a1,rIn,rOut){
  const [x0,y0]=pt(a0,rIn),[x1,y1]=pt(a0,rOut),[x2,y2]=pt(a1,rOut),[x3,y3]=pt(a1,rIn);
  const lg=(a1-a0)>Math.PI?1:0;
  return `M ${x0} ${y0} L ${x1} ${y1} A ${rOut} ${rOut} 0 ${lg} 1 ${x2} ${y2} L ${x3} ${y3} A ${rIn} ${rIn} 0 ${lg} 0 ${x0} ${y0} Z`;
}
function groupRuns(key){
  const runs=[];let cur=null;
  CATALOGO.forEach((c,i)=>{
    const v=c[key];
    if(cur&&cur.v===v&&(key!=="dim"||CATALOGO[i-1].dim===v)){cur.end=i;}
    else{cur={v,start:i,end:i};runs.push(cur);}
  });
  return runs;
}

/* contador de validación */
const VAL={dimArc:0, subArc:0, compBand:0, dimOut:0, subOut:0, compOut:0,
           compInvadeSub:0, subInvadeDim:0, dimInvadeDatos:0};
/* contador específico de COMPETENCIAS (medido con getBBox en runtime) */
const CVAL={total:0, oneLine:0, twoLine:0, outBand:0, invadeSub:0,
            invadeDim:0, invadeDatos:0, fontReduced:0, clip:0};

/* abreviaturas manuales (último recurso; solo si ni con 2 líneas ni con
   reducción de fuente entra). Formato: "linea1|linea2". Hoy ninguna hace
   falta, pero el diccionario queda definido como pide la especificación. */
const COMP_ABBR={};

/* parte una etiqueta en 2 líneas balanceadas por palabra (sin cortar palabras) */
function splitBalanced(label){
  const words=label.split(" ");
  if(words.length===1) return [label];
  let best=1, bd=1e9;
  for(let k=1;k<words.length;k++){
    const l=words.slice(0,k).join(" "), r=words.slice(k).join(" ");
    const dd=Math.abs(l.length-r.length);
    if(dd<bd){bd=dd;best=k;}
  }
  return [words.slice(0,best).join(" "), words.slice(best).join(" ")];
}

/* =====================================================================
   drawArcText: texto sobre arco para Dimensión y Sub-dimensión.
   Invierte SOLO la dirección del path en la mitad inferior (nunca mueve
   el radio ni el texto al centro). Reduce font-size si no entra.
   ===================================================================== */
function drawArcText(defs, label, a0, a1, rText, ringInner, ringOuter, fontSize, weight, fill, letter){
  const mid=(a0+a1)/2;
  // En coords SVG (y hacia abajo), la mitad inferior es deg(mid) ∈ (0,180):
  // ahí el texto sobre arco queda de cabeza y hay que invertir el path.
  const flip = (deg(mid)>0 && deg(mid)<180);
  const dir = flip ? -1 : 1;
  const id=`arc_${(rText*1000|0)}_${(a0*1000|0)}`;
  el("path",{id,d:arcPathDir(a0,a1,rText,dir),fill:"none"},defs);

  // ajuste de tamaño: longitud de arco disponible vs ancho estimado del texto
  const arcLen=Math.abs(a1-a0)*rText;
  let fs=fontSize;
  const approxW=label.length*fs*0.58 + (letter?label.length*letter:0);
  if(approxW>arcLen*0.95){ fs=Math.max(8, fs*arcLen*0.95/approxW); }

  const t=el("text",{"font-size":fs.toFixed(1),"font-weight":weight,fill,
    "letter-spacing":letter||0, "dominant-baseline":"middle"},SVG);
  const tp=el("textPath",{href:`#${id}`,startOffset:"50%","text-anchor":"middle"},t);
  tp.textContent=label;

  // validación: el radio del texto debe caer dentro de su anillo
  if(rText>=ringInner && rText<=ringOuter){/*ok*/}
  return {fs, flip, text:t};
}

function wireSubdimensionTooltip(node,dimension,subdimension){
  node.style.cursor="help";
  node.addEventListener("mousemove",ev=>showSubdimensionTip(ev,dimension,subdimension));
  node.addEventListener("mouseleave",hideTip);
}

function wireDimensionTooltip(node,dimension){
  node.style.cursor="help";
  node.addEventListener("mousemove",ev=>showDimensionTip(ev,dimension));
  node.addEventListener("mouseleave",hideTip);
}

/* =====================================================================
   drawCompetencyLabel  (SOLO competencias; no toca dim/sub)
   - Ancla en el PUNTO MEDIO RADIAL de la banda (R_COMP_TEXT) con
     text-anchor=middle y dominant-baseline=middle  → el texto crece
     simétrico hacia adentro y afuera, nunca descentrado.
   - Mide el texto YA renderizado con getBBox() (no estima):
       bb.width  = extensión RADIAL   (debe caber en la banda)
       bb.height = extensión TANGENCIAL (alto de las 1-2 líneas)
   - Orden: 1 línea → 2 líneas balanceadas por palabra → reducir font →
     (último recurso) abreviatura manual del diccionario.
   - clipPath anular aplicado: imposible desbordar a otra capa.
   - Mantiene legibilidad: lado izquierdo rota +180°, radio constante.
   ===================================================================== */
function drawCompetencyLabel(i, clipId){
  const a=angC(i);
  const d=deg(a);
  const leftSide=(d>90 && d<270);
  const rot = leftSide ? d+180 : d;                 // legible sin quedar de cabeza
  const [cx,cy]=pt(a, R_COMP_TEXT);                  // ancla en el medio de la banda
  const label=CATALOGO[i].label;
  const url=CATALOGO[i].url;

  // espacio útil con margen de seguridad → contención garantizada:
  const MAXR = (R_COMP_OUTER - R_COMP_INNER) - 14;   // extensión radial usable (~76)
  const MAXH = STEP*R_COMP_INNER - 7;                // alto tangencial usable

  const parent=url ? el("a",{href:url,target:"_blank",rel:"noopener noreferrer",
    class:"competency-link","aria-label":`${label}: abrir recurso de la base de conocimiento`},SVG) : SVG;
  if(url){ el("title",{},parent).textContent=`Abrir recurso: ${label}`; }
  const t=el("text",{ "font-weight":"600", fill:"#15161a",
    "text-anchor":"middle", "dominant-baseline":"middle",
    transform:`rotate(${rot} ${cx} ${cy})`,
    "clip-path":`url(#${clipId})`}, parent);

  function paint(lines, fs){
    while(t.firstChild) t.removeChild(t.firstChild);
    t.setAttribute("font-size", fs.toFixed(2));
    if(lines.length===1){
      t.setAttribute("x",cx); t.setAttribute("y",cy);
      t.textContent=lines[0];
    } else {
      t.removeAttribute("x"); t.removeAttribute("y");
      el("tspan",{x:cx,y:cy,dy:"-0.58em"},t).textContent=lines[0];
      el("tspan",{x:cx,y:cy,dy:"1.16em"},t).textContent=lines[1];
    }
    return t.getBBox();   // sin transform: width=radial, height=tangencial
  }

  let fs=11, lines=[label], fontReduced=false;
  let bb=paint(lines, fs);

  // 1) ¿entra en una línea? si no, 2 líneas balanceadas
  if(bb.width>MAXR){
    const two=splitBalanced(label);
    if(two.length===2){ lines=two; bb=paint(lines, fs); }
    // 2) reducir font hasta caber radial Y tangencialmente
    while((bb.width>MAXR || bb.height>MAXH) && fs>7.5){
      fs-=0.5; fontReduced=true; bb=paint(lines, fs);
    }
    // 3) último recurso: abreviatura manual (si existe en diccionario)
    if(bb.width>MAXR && COMP_ABBR[label]){
      lines=COMP_ABBR[label].split("|");
      bb=paint(lines, Math.max(fs,9));
    }
  }

  // ---- validación REAL medida (radio contenido en la banda) ----
  const rIn  = R_COMP_TEXT - bb.width/2;
  const rOut = R_COMP_TEXT + bb.width/2;
  CVAL.total++;
  (lines.length===1?CVAL.oneLine++:CVAL.twoLine++);
  if(fontReduced) CVAL.fontReduced++;
  CVAL.clip++;
  if(rIn < R_COMP_INNER || rOut > R_COMP_OUTER) CVAL.outBand++;
  if(rOut > R_SUB_INNER)  CVAL.invadeSub++;
  if(rOut > R_DIM_INNER)  CVAL.invadeDim++;
  if(rIn  < R_DATOS_MAX)  CVAL.invadeDatos++;
  VAL.compBand++;
  return lines.length;
}

function buildStatic(){
  while(SVG.firstChild)SVG.removeChild(SVG.firstChild);
  const defs=el("defs",{},SVG);
  // reset validación
  Object.keys(VAL).forEach(k=>VAL[k]=0);
  Object.keys(CVAL).forEach(k=>CVAL[k]=0);

  /* ---- CAPA 2: segmentos de DIMENSIÓN (anillo externo) ---- */
  groupRuns("dim").forEach(run=>{
    const col=DIM_COLOR[run.v];
    const a0=ang(run.start),a1=ang(run.end+1);
    const segment=el("path",{d:wedge(a0,a1,R_DIM_INNER,R_DIM_OUTER),fill:col.band,stroke:"#15161a","stroke-width":2.5,
      "aria-label":`${run.v}: ver scores oficiales`},SVG);
    wireDimensionTooltip(segment,run.v);
  });
  /* ---- CAPA 3: segmentos de SUB-DIMENSIÓN ---- */
  groupRuns("sub").forEach(run=>{
    const col=DIM_COLOR[CATALOGO[run.start].dim];
    const a0=ang(run.start),a1=ang(run.end+1);
    const segment=el("path",{d:wedge(a0,a1,R_SUB_INNER,R_SUB_OUTER),fill:col.sub,stroke:"#15161a","stroke-width":1.8,
      "aria-label":`${run.v}: ver scores oficiales`},SVG);
    wireSubdimensionTooltip(segment,CATALOGO[run.start].dim,run.v);
  });
  /* ---- CAPA 4: banda del anillo de competencias (fondo claro) ---- */
  el("circle",{cx:CX,cy:CY,r:R_COMP_OUTER,fill:"none",stroke:"#e0e1e4","stroke-width":1},SVG);
  el("circle",{cx:CX,cy:CY,r:R_COMP_INNER,fill:"none",stroke:"#e0e1e4","stroke-width":1},SVG);

  /* ---- CAPA 5: grilla porcentual 20/40/60/80/100 (área de datos) ---- */
  [20,40,60,80,100].forEach(p=>{
    const r=R_HUB+(R_DATOS_MAX-R_HUB)*(p/100);
    el("circle",{cx:CX,cy:CY,r,fill:"none",
      stroke:p===100?"#15161a":"var(--grid-strong)",
      "stroke-width":p===100?1.8:1.1,
      "stroke-dasharray":p===100?"none":"4 4"},SVG);
  });

  /* ---- CAPA 6: líneas radiales por COMPETENCIA (desde el origen hasta
         el borde externo del anillo de competencias) ---- */
  const subStarts=new Set(groupRuns("sub").map(r=>r.start));
  const dimStarts=new Set(groupRuns("dim").map(r=>r.start));
  for(let i=0;i<N;i++){
    const a=ang(i);
    const [x0,y0]=pt(a,R_HUB);
    // competencia: fina, llega hasta el borde del anillo de competencias
    const [xC,yC]=pt(a,R_COMP_OUTER);
    el("line",{x1:x0,y1:y0,x2:xC,y2:yC,stroke:"#c2c4cb","stroke-width":0.8},SVG);
  }
  /* ---- CAPA 7: divisiones de SUB-DIMENSIÓN (media) ---- */
  for(let i=0;i<N;i++){
    if(!subStarts.has(i)) continue;
    const a=ang(i);
    const [x0,y0]=pt(a,R_HUB),[x1,y1]=pt(a,R_SUB_OUTER);
    el("line",{x1:x0,y1:y0,x2:x1,y2:y1,stroke:"#8a8d95","stroke-width":1.6},SVG);
  }
  /* ---- CAPA 8: divisiones de DIMENSIÓN (gruesa) ---- */
  for(let i=0;i<N;i++){
    if(!dimStarts.has(i)) continue;
    const a=ang(i);
    const [x0,y0]=pt(a,R_HUB),[x1,y1]=pt(a,R_DIM_OUTER);
    el("line",{x1:x0,y1:y0,x2:x1,y2:y1,stroke:"#15161a","stroke-width":2.6},SVG);
  }
  // borde del área de datos
  el("circle",{cx:CX,cy:CY,r:R_DATOS_MAX,fill:"none",stroke:"#15161a","stroke-width":1.4},SVG);

  /* ---- ticks de porcentaje (eje horizontal, ambos lados) ---- */
  [0,Math.PI].forEach(base=>{
    [20,40,60,80,100].forEach(p=>{
      const r=R_HUB+(R_DATOS_MAX-R_HUB)*(p/100);
      const [x,y]=pt(base,r);
      el("rect",{x:x-12,y:y-9,width:24,height:13,fill:"#fff","fill-opacity":0.85,rx:2},SVG);
      el("text",{x,y:y-3,"font-size":9,"fill":"#4a4c52","text-anchor":"middle","font-weight":"700"},SVG).textContent=p;
    });
  });

  /* DATA layer placeholder (se dibuja encima en buildData) */
  dataLayer=el("g",{id:"dataLayer"},SVG);

  /* ---- CAPA 11: textos de COMPETENCIA (con clip por anillo) ---- */
  // clip anular: solo se ve lo que cae entre R_COMP_INNER y R_COMP_OUTER
  const clipId="clipComp";
  const cp=el("clipPath",{id:clipId},defs);
  // anillo = círculo externo menos interno -> usamos path even-odd
  const ringPath=`M ${CX-R_COMP_OUTER} ${CY} a ${R_COMP_OUTER} ${R_COMP_OUTER} 0 1 0 ${2*R_COMP_OUTER} 0 a ${R_COMP_OUTER} ${R_COMP_OUTER} 0 1 0 ${-2*R_COMP_OUTER} 0 Z `+
                 `M ${CX-R_COMP_INNER} ${CY} a ${R_COMP_INNER} ${R_COMP_INNER} 0 1 0 ${2*R_COMP_INNER} 0 a ${R_COMP_INNER} ${R_COMP_INNER} 0 1 0 ${-2*R_COMP_INNER} 0 Z`;
  el("path",{d:ringPath,"clip-rule":"evenodd"},cp);
  for(let i=0;i<N;i++){ drawCompetencyLabel(i, clipId); }

  /* ---- CAPA 12: textos de SUB-DIMENSIÓN (arco) ---- */
  groupRuns("sub").forEach(run=>{
    const col=DIM_COLOR[CATALOGO[run.start].dim];
    const a0=ang(run.start)+0.012, a1=ang(run.end+1)-0.012;
    const arc=drawArcText(defs, run.v, a0, a1, R_SUB_TEXT, R_SUB_INNER, R_SUB_OUTER, 13, "700", col.text, 0);
    wireSubdimensionTooltip(arc.text,CATALOGO[run.start].dim,run.v);
    VAL.subArc++;
  });
  /* ---- CAPA 13: textos de DIMENSIÓN (arco, encima) ---- */
  groupRuns("dim").forEach(run=>{
    const a0=ang(run.start)+0.02, a1=ang(run.end+1)-0.02;
    const arc=drawArcText(defs, run.v.toUpperCase(), a0, a1, R_DIM_TEXT, R_DIM_INNER, R_DIM_OUTER, 28, "700", "#fff", 3);
    wireDimensionTooltip(arc.text,run.v);
    VAL.dimArc++;
  });

  /* ---- centro limpio ---- */
  el("circle",{cx:CX,cy:CY,r:R_HUB,fill:"#fff",stroke:"#b9bcc4","stroke-width":1},SVG);

  runValidation();
}

/* =====================================================================
   VALIDACIÓN TÉCNICA: cada texto debe caer dentro de su anillo.
   Recorre los <text>/<textPath> y comprueba el radio asociado.
   ===================================================================== */
function runValidation(){
  // Validación geométrica por construcción de radios:
  VAL.dimOut  = (R_DIM_TEXT>=R_DIM_INNER && R_DIM_TEXT<=R_DIM_OUTER)?0:VAL.dimArc;
  VAL.subOut  = (R_SUB_TEXT>=R_SUB_INNER && R_SUB_TEXT<=R_SUB_OUTER)?0:VAL.subArc;
  VAL.compOut = (R_COMP_TEXT>=R_COMP_INNER && R_COMP_TEXT<=R_COMP_OUTER)?0:VAL.compBand;
  // invasiones entre zonas (radios no se solapan por diseño):
  VAL.compInvadeSub   = (R_COMP_OUTER<=R_SUB_INNER)?0:N;
  VAL.subInvadeDim    = (R_SUB_OUTER<=R_DIM_INNER)?0:groupRuns("sub").length;
  VAL.dimInvadeDatos  = (R_DIM_INNER>=R_DATOS_MAX)?0:groupRuns("dim").length;

  console.log("=== VALIDACIÓN DE ETIQUETAS ===");

  console.log("Textos de dimensión renderizados con arco:", VAL.dimArc);
  console.log("Textos de subdimensión renderizados con arco:", VAL.subArc);
  console.log("Textos de competencia renderizados en su banda:", VAL.compBand);

  console.log("Subdimensiones que invaden anillo de dimensión:", VAL.subInvadeDim);
  console.log("Dimensiones que invaden área de datos:", VAL.dimInvadeDatos);

  console.log("=== VALIDACIÓN DE COMPETENCIAS ===");
  console.log("Competencias totales:", CVAL.total);
  console.log("Competencias en 1 línea:", CVAL.oneLine);
  console.log("Competencias en 2 líneas:", CVAL.twoLine);
  console.log("Competencias fuera de su anillo:", CVAL.outBand);
  console.log("Competencias que invaden Sub Dimensión:", CVAL.invadeSub);

function selectedScoreMap(selected,periodo){
  const result={};
  CATALOGO.forEach(c=>{
    const vals=selected.map(e=>(SCORES[e]&&SCORES[e][periodo]||{})[c.label]).filter(v=>v!=null);
    if(vals.length) result[c.label]=vals.reduce((a,b)=>a+b,0)/vals.length;
  });
  return result;
}

function selectedRoleScoreMap(selected,roles,periodo){
  const result={};
  CATALOGO.forEach(c=>{
    const rows=ROLE_STATS.filter(r=>selected.includes(r.equipo)&&roles.includes(r.rol)&&r.periodo===periodo&&r.etiqueta===c.label);
    const count=rows.reduce((sum,r)=>sum+Number(r.count||0),0);
    if(count) result[c.label]=rows.reduce((sum,r)=>sum+Number(r.avg)*Number(r.count||0),0)/count;
  });
  return result;
}

let dataLayer=null;
function buildData(selected,roles,qA,qC){
  // limpiar capa de datos
  while(dataLayer && dataLayer.firstChild) dataLayer.removeChild(dataLayer.firstChild);
  const allRoles=availableRoleValues.length>0&&availableRoleValues.every(r=>roles.includes(r));
  const roleFiltered=roles.length>0&&!allRoles;
  const mA=!roles.length?{}:roleFiltered?selectedRoleScoreMap(selected,roles,qA):selectedScoreMap(selected,qA);
  const mC=!roles.length?{}:roleFiltered?selectedRoleScoreMap(selected,roles,qC):selectedScoreMap(selected,qC);
  const ringR=s=>R_HUB+(R_DATOS_MAX-R_HUB)*(Math.max(0,Math.min(10,s))/10);
  function poly(map,color,periodo){
    const valid=[];
    for(let i=0;i<N;i++){const s=map[CATALOGO[i].label];if(s==null)continue;valid.push({p:pt(angC(i),ringR(s)),i,s});}
    if(valid.length<2)return;
    let d="M "+valid[0].p[0].toFixed(2)+" "+valid[0].p[1].toFixed(2);
    for(let k=1;k<valid.length;k++)d+=" L "+valid[k].p[0].toFixed(2)+" "+valid[k].p[1].toFixed(2);
    d+=" Z";
    el("path",{d,fill:"none",stroke:color,"stroke-width":2.8,"stroke-linejoin":"round","stroke-linecap":"round"},dataLayer);
    valid.forEach(({p,i,s})=>{
      const c=el("circle",{cx:p[0],cy:p[1],r:4.8,fill:color,stroke:"#fff","stroke-width":1.6},dataLayer);
      c.style.cursor="pointer";
      c.addEventListener("mousemove",ev=>showTip(ev,CATALOGO[i].label,s,selected,roles,periodo,roleFiltered));
      c.addEventListener("mouseleave",hideTip);
    });
  }
  poly(mC,Q_COMP_COLOR,qC);
  poly(mA,Q_ACTUAL_COLOR,qA);
}

function showTip(ev,label,val,selected,roles,periodo,roleFiltered){

    selected.includes(r.equipo)&&r.periodo===periodo&&r.etiqueta===label&&(!roleFiltered||roles.includes(r.rol))
  );

    ? `<table><thead><tr><th>Equipo / Rol</th><th class="num">N</th><th class="num">Prom.</th></tr></thead><tbody>${

      }</tbody></table>`
    : teamRows.length

function selectedIndexValue(selected,periodo,tipo){

  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;

function renderKPIs(selected,qA,qC){
  const percent=v=>{
    if(v==null)return "—";
    const value=v*10;
    return `${value.toFixed(1).replace(/\.0$/,"")}%`;
  };
  const deltaPercent=v=>{
    if(v==null)return "—";
    const value=Math.abs(v*10)<.05?0:v*10;
    return `${value>=0?"+":""}${value.toFixed(1).replace(/\.0$/,"")}%`;
  };
  const card=(label,tipo)=>{
    const actual=selectedIndexValue(selected,qA,tipo);
    const anterior=selectedIndexValue(selected,qC,tipo);
    const delta=actual!=null&&anterior!=null?actual-anterior:null;
    const color=delta==null?'#5f6168':delta>=0?'#1E7A4D':'#D81E26';
    return `<div class="kpi"><div class="l">${label}</div><div class="v">${percent(actual)}</div><div class="s">${qA||'Periodo actual'} · ${qC?`${qC}: ${percent(anterior)} · `:''}<span style="color:${color}">Δ ${deltaPercent(delta)}</span></div></div>`;
  };
  document.getElementById('kpis').innerHTML=
    card('Índice de Madurez','madurez')+
    card('Índice Cultura','cultura')+
    card('Índice Rendimiento','rendimiento');
}

function periodoSortKey(p){
  const m=/^Q(\d+)-(\d{4})$/i.exec((p||"").trim());
  if(!m) return [9999,99];
  return [parseInt(m[2],10),parseInt(m[1],10)];
}
function comparePeriodos(a,b){
  const [ay,aq]=periodoSortKey(a),[by,bq]=periodoSortKey(b);
  return ay-by || aq-bq;
}
function periodos(selected){
  const ps=[...new Set(RAW.filter(r=>selected.includes(r.equipo)).map(r=>r.periodo))];
  return ps.sort(comparePeriodos);
}
const allP=[...new Set(RAW.map(r=>r.periodo))].sort(comparePeriodos);
document.getElementById('warnPeriods').textContent=
  allP.length? `Periodos disponibles: ${allP.join(", ")}.`
  : "Sin datos de periodos disponibles.";

function fillPeriodos(){
  const selected=[...selectedTeams];
  const ps=periodos(selected),prevA=selQA.value,prevC=selQC.value;
  selQA.innerHTML='';selQC.innerHTML='';
  ps.forEach(p=>{selQA.appendChild(new Option(p,p));selQC.appendChild(new Option(p,p));});
  if(ps.includes(prevA)){selQA.value=prevA;}
  else if(ps.includes(DEFAULTS.q_actual)){selQA.value=DEFAULTS.q_actual;}
  else if(ps.length>=2){selQA.value=ps[ps.length-1];}
  else if(ps.length===1){selQA.value=ps[0];}
  if(ps.includes(prevC)){selQC.value=prevC;}
  else if(ps.includes(DEFAULTS.q_comp)){selQC.value=DEFAULTS.q_comp;}
  else if(ps.length>=2){selQC.value=ps[ps.length-2];}
  else if(ps.length===1){selQC.value=ps[0];}
  renderRoleOptions();
  update();
}
function update(){
  const selected=[...selectedTeams];
  const roles=[...selectedRoles];
  const allRoles=availableRoleValues.length>0&&availableRoleValues.every(r=>selectedRoles.has(r));
  document.getElementById('lgA').textContent=selQA.value?selQA.value+' (actual)':'Actual';
  document.getElementById('lgC').textContent=selQC.value?selQC.value+' (comparativo)':'Comparativo';
  document.getElementById('roleNote').textContent=!roles.length
    ? 'Sin roles seleccionados: el radar no muestra resultados.'
    : allRoles
      ? 'Todos los roles: resultados consolidados. Los índices superiores son oficiales.'
      : 'Filtro por roles activo. El comparativo aparece solo si existe detalle histórico por rol.';
  buildData(selected,roles,selQA.value,selQC.value);
  renderKPIs(selected,selQA.value,selQC.value);
}
selQA.addEventListener('change',()=>{renderRoleOptions();update();});
selQC.addEventListener('change',update);

function applyRadarZoom(){
  const centerX=(radarStage.scrollLeft+radarStage.clientWidth/2)/Math.max(radarStage.scrollWidth,1);
  const centerY=(radarStage.scrollTop+radarStage.clientHeight/2)/Math.max(radarStage.scrollHeight,1);
  radarZoom=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,Math.round(radarZoom*10)/10));
  SVG.style.width=`${Math.round(radarZoom*100)}%`;
  SVG.style.height=`${Math.round(Math.max(560,window.innerHeight-164)*radarZoom)}px`;
  SVG.style.minHeight='0';
  SVG.style.margin=radarZoom<1?'0 auto':'0';
  zoomLevelOutput.value=`${Math.round(radarZoom*100)}%`;
  zoomLevelOutput.textContent=zoomLevelOutput.value;
  zoomOut.disabled=radarZoom<=ZOOM_MIN;
  zoomIn.disabled=radarZoom>=ZOOM_MAX;
  requestAnimationFrame(()=>{
    radarStage.scrollLeft=Math.max(0,centerX*radarStage.scrollWidth-radarStage.clientWidth/2);
    radarStage.scrollTop=Math.max(0,centerY*radarStage.scrollHeight-radarStage.clientHeight/2);
  });
}
zoomOut.addEventListener('click',()=>{radarZoom-=ZOOM_STEP;applyRadarZoom();});
zoomIn.addEventListener('click',()=>{radarZoom+=ZOOM_STEP;applyRadarZoom();});

}
document.getElementById('btnSvg').addEventListener('click',()=>{
  const ser=serializedRadar();
  const blob=new Blob(['<?xml version="1.0"?>\n'+ser],{type:'image/svg+xml'});
  const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=fname('svg');a.click();URL.revokeObjectURL(u);
});
document.getElementById('btnPng').addEventListener('click',()=>{
  const ser=serializedRadar(),img=new Image();
  img.onload=()=>{const sc=2.5,c=document.createElement('canvas');c.width=1120*sc;c.height=1120*sc;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);const a=document.createElement('a');a.href=c.toDataURL('image/png',1);a.download=fname('png');a.click();};
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(ser)));
});

equipos.forEach(equipo=>selectedTeams.add(equipo));
syncTeamChecks();updateTeamLabel();
buildStatic();
applyRadarZoom();
fillPeriodos();
</script>
